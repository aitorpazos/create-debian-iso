name: Release

on:
  push:
    tags:
      - 'v*'

env:
  IMAGE_TAG: aitorpazos/create-debian-iso

jobs:
  lint:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run shellcheck
        run: shellcheck create-iso.sh chroot-script.sh example/config/configure.sh

  build-bookworm:
    name: Debian Bookworm
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
      - name: Build image
        run: make buildDebianBookworm
      - name: Test image
        run: make testExampleBookworm
      - name: Tag images
        run: |
          docker tag ${{ env.IMAGE_TAG }}:debian-bookworm ${{ env.IMAGE_TAG }}:latest
          docker tag ${{ env.IMAGE_TAG }}:debian-bookworm ${{ env.IMAGE_TAG }}:${{ steps.version.outputs.VERSION }}
          docker tag ${{ env.IMAGE_TAG }}:debian-bookworm ${{ env.IMAGE_TAG }}:debian-bookworm-${{ steps.version.outputs.VERSION }}
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push images
        run: |
          docker push ${{ env.IMAGE_TAG }}:debian-bookworm
          docker push ${{ env.IMAGE_TAG }}:latest
          docker push ${{ env.IMAGE_TAG }}:${{ steps.version.outputs.VERSION }}
          docker push ${{ env.IMAGE_TAG }}:debian-bookworm-${{ steps.version.outputs.VERSION }}

  build-noble:
    name: Ubuntu Noble
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
      - name: Build image
        run: make buildUbuntuNoble
      - name: Test image
        run: make testExampleNoble
      - name: Tag images
        run: |
          docker tag ${{ env.IMAGE_TAG }}:ubuntu-noble ${{ env.IMAGE_TAG }}:ubuntu-noble-${{ steps.version.outputs.VERSION }}
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push images
        run: |
          docker push ${{ env.IMAGE_TAG }}:ubuntu-noble
          docker push ${{ env.IMAGE_TAG }}:ubuntu-noble-${{ steps.version.outputs.VERSION }}

  build-neon:
    name: KDE Neon
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
      - name: Build image
        run: make buildKdeNeon
      - name: Test image
        run: make testExampleNeon
      - name: Tag images
        run: |
          docker tag ${{ env.IMAGE_TAG }}:kde-neon ${{ env.IMAGE_TAG }}:kde-neon-${{ steps.version.outputs.VERSION }}
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push images
        run: |
          docker push ${{ env.IMAGE_TAG }}:kde-neon
          docker push ${{ env.IMAGE_TAG }}:kde-neon-${{ steps.version.outputs.VERSION }}

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-bookworm
      - build-noble
      - build-neon
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
